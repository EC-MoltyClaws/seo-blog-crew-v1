name: Daily Blog Post

on:
  workflow_dispatch:
  schedule:

permissions:
  contents: write
  issues: write

jobs:
  run-crew:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-caching: true

      - name: Install dependencies
        run: uv sync

      - name: Run blog crew
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          MAKE_WEBHOOK_FETCH_TOPIC: ${{ secrets.MAKE_WEBHOOK_FETCH_TOPIC }}
          MAKE_WEBHOOK_API_KEY: ${{ secrets.MAKE_WEBHOOK_API_KEY }}
          MAKE_WEBHOOK_PUBLISH_POST: ${{ secrets.MAKE_WEBHOOK_PUBLISH_POST }}
        run: uv run python main.py

      - name: Commit published JSON log
        run: |
          git config --global user.name "Molty[bot]"
          git config --global user.email "molty@openclaw.ai"
          git add published_posts.json || echo "No file found"
          git commit -m "chore: log published blog post" || echo "No changes to commit"
          git push
